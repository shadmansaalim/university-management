version: "3.9"

services:
  # ==========================
  # API Gateway
  # ==========================
  api-gateway:
    image: shadmansaalim321/university-management-api-gateway:latest
    container_name: university-management-api-gateway
    restart: unless-stopped
    ports:
      - "3030:3030"
    env_file:
      - ./env/gateway.env
    depends_on:
      - auth-service
      - core-service
    networks:
      - university-network

  # ==========================
  # Auth Service
  # ==========================
  auth-service:
    image: shadmansaalim321/university-management-backend-auth-service:latest
    container_name: university-management-backend-auth-service
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./env/auth.env
    depends_on:
      - redis
    networks:
      - university-network

  # ==========================
  # Core Service
  # ==========================
  core-service:
    image: shadmansaalim321/university-management-core-service:latest
    container_name: university-management-core-service
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      - ./env/core.env
    depends_on:
      - redis
      - postgres
    networks:
      - university-network

  # ==========================
  # Frontend
  # ==========================
  frontend:
    image: shadmansaalim321/university-management-frontend:latest
    container_name: university-management-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./env/frontend.env
    depends_on:
      - api-gateway
    networks:
      - university-network

  # ==========================
  # Redis
  # ==========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - university-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - university-network

networks:
  university-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
